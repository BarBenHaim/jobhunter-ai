version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobhunter-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobhunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobhunter_pass}
      POSTGRES_DB: ${POSTGRES_DB:-jobhunter}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobhunter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jobhunter-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: jobhunter-server
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobhunter}:${POSTGRES_PASSWORD:-jobhunter_pass}@postgres:5432/${POSTGRES_DB:-jobhunter}
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      APP_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./cv-templates:/app/cv-templates
      - ./generated-cvs:/app/generated-cvs
    command: npm run dev

  client:
    build: ./client
    container_name: jobhunter-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3001
    command: npm run dev

volumes:
  pgdata:
  redisdata:
